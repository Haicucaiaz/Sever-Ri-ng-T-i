name: Sort Playlist

on:
  schedule:
    - cron: '0 */6 * * *'   # mỗi 6 giờ
  workflow_dispatch:         # cho phép chạy thủ công

jobs:
  sort:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Download raw playlist
        run: |
          curl -o raw.m3u8 https://raw.githubusercontent.com/Haicucaiaz/Sever-Ri-ng-T-i/refs/heads/main/Flim
      
      - name: Sort playlist by title
        run: |
          python3 << 'EOF'
          import re
          
          with open('raw.m3u8', 'r', encoding='utf-8') as f:
              lines = f.readlines()
          
          items = []
          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith('#EXTINF:'):
                  # lấy title
                  last_comma = line.rfind(',')
                  title = line[last_comma+1:].strip()
                  url = lines[i+1].strip() if i+1 < len(lines) else ''
                  items.append((title, url))
                  i += 2
              else:
                  i += 1
          
          items.sort(key=lambda x: x[0].lower())
          
          output = '#EXTM3U\n'
          for title, url in items:
              output += f'#EXTINF:-1 tvg-logo="" group-title="", {title}\n{url}\n'
          
          with open('sorted_playlist.m3u8', 'w', encoding='utf-8') as f:
              f.write(output)
          EOF
      
      - name: Commit and push sorted file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add sorted_playlist.m3u8
          git commit -m "Auto-sort playlist [skip ci]" || echo "No changes"
          git push
