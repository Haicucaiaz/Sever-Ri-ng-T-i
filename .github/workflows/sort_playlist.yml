name: Sort Playlist

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Quan trọng: cho phép push code
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download raw playlist
        run: |
          curl -o raw.m3u8 https://raw.githubusercontent.com/Haicucaiaz/Sever-Ri-ng-T-i/refs/heads/main/Flim

      - name: Sort playlist by title
        run: |
          python3 << 'EOF'
          import re
          
          with open('raw.m3u8', 'r', encoding='utf-8') as f:
              lines = f.readlines()
          
          items = []
          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith('#EXTINF:'):
                  last_comma = line.rfind(',')
                  title = line[last_comma+1:].strip()
                  url = lines[i+1].strip() if i+1 < len(lines) else ''
                  items.append((title, url))
                  i += 2
              else:
                  i += 1
          
          items.sort(key=lambda x: x[0].lower())
          
          output = '#EXTM3U\n'
          for title, url in items:
              output += f'#EXTINF:-1 tvg-logo="" group-title="", {title}\n{url}\n'
          
          with open('sorted_playlist.m3u8', 'w', encoding='utf-8') as f:
              f.write(output)
          
          print(f"✅ Đã sắp xếp {len(items)} kênh")
          EOF

      - name: Commit and push sorted file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sorted_playlist.m3u8
          if git diff --cached --quiet; then
            echo "Không có thay đổi để commit"
          else
            git commit -m "Auto-sort playlist [skip ci]"
            git push origin HEAD:main
          fi
